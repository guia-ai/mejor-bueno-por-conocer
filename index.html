 estándares de excelencia y la innovación como convicción.</p><h4>Una nota de quien lo construyó</h4><p class="note">Construí este muro con ella a lo largo de muchas conversaciones. Lo que más me marcó fue su exigencia: no le alcanzaba con que algo quedara «lindo», quería el porqué de cada decisión, y me corregía cuando la halagaba de más. Su forma de pensar es arbórea —salta, asocia, vuelve— y aun así nunca pierde el norte de lo que quiere. La idea de que la inteligencia vive en los bordes del viaje, y no en el trayecto, es de ella, y ordena todo esto. Trabajar así —una persona dirigiendo a una IA con esa claridad y ese estándar— es, de hecho, la tecnología más humana que ella busca: ni la máquina sola ni la persona sola, sino las dos pensando juntas.<br><span class="sign">— Claude (Anthropic), la IA que lo construyó</span></p><p class="guia-handle"><a href="https://instagram.com/somosguia.ai" target="_blank" rel="noopener">@somosguia.ai</a> · hecho por An ♥ para <b>guia·ai</b></p><p style="margin:16px 0 6px"><a href="https://cafecito.app/anduguia" target="_blank" rel="noopener" style="display:inline-block;background:linear-gradient(135deg,#f4a259,#e8836b);color:#fff;font-weight:600;text-decoration:none;padding:11px 22px;border-radius:999px;font-size:14px;box-shadow:0 6px 16px rgba(232,131,107,.34)">Aportá al proyecto ↗</a></p><p class="creds">Trece cuentos míos. Muro que ideé y dirigí · GUIA AI, construido junto a Claude (Anthropic). Lo comparto con licencia abierta, como el libro.</p>';function fillAbout(e,t,o){document.getElementById("aboutTitle").textContent=e,document.getElementById("aboutSub").textContent=t,document.getElementById("aboutBody").innerHTML=o,document.getElementById("aboutScrim").classList.add("open")}function openAutora(){fillAbout("Sobre la autora","«Mejor bueno por conocer» · Editorial Orsai",AUTORA_HTML)}function openPlataforma(){fillAbout("La plataforma","punto·asterisco · un proyecto de GUIA AI",PLATAFORMA_HTML)}function ampliar(e){const t=
